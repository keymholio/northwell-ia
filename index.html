  body {

    color: var(--gray-900);
    display: flex;
    height: 100vh;
    overflow: hidden;

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--navy);
    color: #fff;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }

  #sidebar-header h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    opacity: .7;
    margin-bottom: 4px;
  }

  #sidebar-header p {
    font-size: 11px;
    opacity: .5;
  }

  #search-wrap {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  #search {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: #fff;
    padding: 7px 10px;
    font-size: 12px;
    outline: none;
  }

  #search::placeholder { color: rgba(255,255,255,0.4); }
  #search:focus { border-color: var(--teal); background: rgba(255,255,255,0.15); }

  #site-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }

  .site-group-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    padding: 10px 16px 4px;
  }

  .site-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background .15s;
    border-left: 3px solid transparent;
  }

  .site-item:hover { background: rgba(255,255,255,0.07); }

  .site-item.active {
    background: rgba(0,163,173,0.2);
    border-left-color: var(--teal);
  }

  .site-item .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .site-item .site-name {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
  }

  .site-item .page-count {
    font-size: 10px;
    opacity: .5;
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 10px;
  }

  /* ── MAIN ── */

    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  #site-badge {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    flex-shrink: 0;

  #site-title { font-size: 18px; font-weight: 700; color: var(--gray-900); }
  #site-url { font-size: 12px; color: var(--gray-600); margin-top: 1px; }
  #site-url a { color: inherit; text-decoration: none; }
  #site-url a:hover { text-decoration: underline; }

  #topbar-meta {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;

  .meta-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
    border: 1px solid currentColor;

  #expand-all, #collapse-all {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--gray-300);
    background: #fff;
    cursor: pointer;
    color: var(--gray-800);
    transition: background .15s;

  #expand-all:hover, #collapse-all:hover { background: var(--gray-100); }

  #content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  /* ── OVERVIEW GRID ── */

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .overview-card {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: box-shadow .2s, transform .15s;
    border-top: 3px solid transparent;

  .overview-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,.1);

  }

  .overview-card .card-url { font-size: 10px; color: var(--gray-600); margin-bottom: 10px; }

  .card-stats { display: flex; gap: 8px; margin-bottom: 10px; }
  .card-stat {
    font-size: 10px;
    background: var(--gray-100);
    padding: 3px 7px;
    border-radius: 4px;
    color: var(--gray-800);
  }

  .card-top-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .nav-pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--gray-100);
    color: var(--gray-800);

  .search-group-url {

    color: var(--gray-600);

  .search-hit {

      font-size:14px;outline:none;margin-bottom:8px;box-sizing:border-box;
    " onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="auth-error" style="font-size:12px;color:#c62828;min-height:18px;margin-bottom:8px"></div>
    <button onclick="checkAuth()" style="
      width:100%;padding:11px;background:#003087;color:#fff;

<script>
const AUTH_HASH = '8d7c4e246994d54c4a58f9a8e55fb9bc41594c8fa83429723abb329fea99e457';

async function checkAuth() {
  const input = document.getElementById('auth-input');
  const val = input.value;
  input.value = '';
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hash === AUTH_HASH) {
    document.getElementById('auth-overlay').style.display = 'none';
  } else {
    document.getElementById('auth-error').textContent = 'Incorrect password. Please try again.';
    input.focus();
  }
}
document.getElementById('auth-input').focus();
</script>

const fmtPages = p => p ? p.toLocaleString() : '—';

// ─────────────────────────────────────────────
// GROUP ORDER
// ─────────────────────────────────────────────
const GROUP_ORDER = [
  'Root Site',
  'Hospitals',
  'Clinical Ecosystem',
  'Research & Professional',
  'Content',
  'Insurance',
];

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('site-list');

  // ── Root site pinned at very top ──
  const root = SITES.find(s => s.cat === 'flagship');
  if (root) {
    const label = document.createElement('div');
    label.className = 'site-group-label';
    label.textContent = 'Root Site';
    list.appendChild(label);

    const item = document.createElement('div');
    item.className = 'site-item';
    item.dataset.id = root.id;
    item.innerHTML = `
      <div class="dot cat-${root.cat}"></div>
      <div class="site-name">${root.name}</div>
      <div class="page-count">${fmtPages(root.pages)}</div>
    `;
    item.onclick = () => showSite(root.id);
    list.appendChild(item);

    const sep = document.createElement('div');
    sep.style.cssText = 'border-top:1px solid rgba(255,255,255,0.1);margin:6px 0';
    list.appendChild(sep);
  }

  // ── All other sites grouped ──
  const groups = {};
  SITES.forEach(s => {
    if (s.cat === 'flagship') return;
    const g = CATS[s.cat].group;
    if (!groups[g]) groups[g] = [];
    groups[g].push(s);
  });

  GROUP_ORDER.filter(g => g !== 'Root Site').forEach(gName => {
    if (!groups[gName]) return;
    const label = document.createElement('div');
    label.className = 'site-group-label';
    label.textContent = gName;
    list.appendChild(label);

    groups[gName].sort((a, b) => a.name.localeCompare(b.name)).forEach(s => {
      const item = document.createElement('div');
      item.className = 'site-item';
      item.dataset.id = s.id;
      item.innerHTML = `
        <div class="dot cat-${s.cat}"></div>
        <div class="site-name">${s.name}</div>
        <div class="page-count">${fmtPages(s.pages)}</div>
      `;
      item.onclick = () => showSite(s.id);
      list.appendChild(item);
    });
  });
}

// ─────────────────────────────────────────────
// OVERVIEW
// ─────────────────────────────────────────────
function buildOverview() {
  const grid = document.getElementById('overview-grid');

  // ── Root site (Northwell Health) pinned at top ──
  const root = SITES.find(s => s.cat === 'flagship');
  if (root) {
    const rootLabel = document.createElement('div');
    rootLabel.className = 'group-title';
    rootLabel.textContent = 'Root Site';
    grid.appendChild(rootLabel);

    const rootRow = document.createElement('div');
    rootRow.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:4px;grid-column:1/-1';
    grid.appendChild(rootRow);

    const rootCard = document.createElement('div');
    rootCard.className = `overview-card cat-${root.cat}`;
    rootCard.innerHTML = `
      <h3>${root.name}</h3>
      <div class="card-url">${root.url}</div>
      <div class="card-stats">
        <span class="card-stat">📄 ${fmtPages(root.pages)} pages</span>
        <span class="card-stat" style="background:transparent;padding:0;font-size:10px;opacity:.7">Root / Flagship</span>
      </div>
      <div class="card-top-nav">
        ${root.topNav.map(t => `<span class="nav-pill">${t}</span>`).join('')}
      </div>
    `;
    rootCard.onclick = () => showSite(root.id);
    rootRow.appendChild(rootCard);

    const divider = document.createElement('div');
    divider.style.cssText = 'border-top:1px solid var(--gray-200);margin:8px 0 4px;grid-column:1/-1';
    grid.appendChild(divider);
  }

  // ── All other sites grouped below ──
  const groups = {};
  SITES.forEach(s => {
    if (s.cat === 'flagship') return;
    const g = CATS[s.cat].group;
    if (!groups[g]) groups[g] = [];
    groups[g].push(s);
  });

  GROUP_ORDER.filter(g => g !== 'Root Site').forEach(gName => {
    if (!groups[gName]) return;
    const gt = document.createElement('div');
    gt.className = 'group-title';
    gt.textContent = gName;
    grid.appendChild(gt);

    const row = document.createElement('div');
    row.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:4px;grid-column:1/-1';
    grid.appendChild(row);

    groups[gName].forEach(s => {
      const card = document.createElement('div');
      card.className = `overview-card cat-${s.cat}`;
      card.innerHTML = `
        <h3>${s.name}</h3>
        <div class="card-url">${s.url}</div>
        <div class="card-stats">
          <span class="card-stat">📄 ${fmtPages(s.pages)} pages</span>
          <span class="card-stat cat-${s.cat}" style="background:transparent;padding:0;font-size:10px;opacity:.7">${CATS[s.cat].label}</span>
        </div>
        <div class="card-top-nav">
          ${s.topNav.map(t => `<span class="nav-pill">${t}</span>`).join('')}
        </div>
      `;
      card.onclick = () => showSite(s.id);
      row.appendChild(card);
    });
  });
}

// ─────────────────────────────────────────────
// TREE RENDERING
// ─────────────────────────────────────────────
const TAG_MAP = {
  'section': { cls: 'tag-section', icon: '📁' },
  'program': { cls: 'tag-program', icon: '⚕️' },
  'pdf':     { cls: 'tag-pdf',     icon: '📄' },
  'tool':    { cls: 'tag-tool',    icon: '🔍' },
  'content': { cls: 'tag-content', icon: '📰' },
  '':        { cls: '',            icon: '🏠' },
};

function sortTree(node) {
  if (node.children && node.children.length) {
    node.children.sort((a, b) => a.label.localeCompare(b.label));
    node.children.forEach(sortTree);
  }
  return node;
}

function renderNode(node, depth) {
  const el = document.createElement('div');
  el.className = 'tree-node';

  const hasChildren = node.children && node.children.length > 0;
  const tagInfo = TAG_MAP[node.tag || ''] || { cls: '', icon: '·' };
  const icon = depth === 0 ? '🏠' : (hasChildren ? (node.tag === 'program' ? '⚕️' : node.tag === 'pdf' ? '📄' : node.tag === 'content' ? '📰' : node.tag === 'tool' ? '🔍' : '📁') : '↳');

  const row = document.createElement('div');
  row.className = 'tree-row';

  // indent
  for (let i = 0; i < depth; i++) {
    const ind = document.createElement('div');
    ind.className = 'tree-indent';
    row.appendChild(ind);
  }

  // toggle
  const toggle = document.createElement('div');
  toggle.className = `tree-toggle ${hasChildren ? '' : 'leaf'}`;
  toggle.textContent = hasChildren ? '▶' : '';
  row.appendChild(toggle);

  // icon
  const iconEl = document.createElement('div');
  iconEl.className = 'tree-icon';
  iconEl.textContent = depth === 0 ? '🏠' : (hasChildren ? (node.tag === 'pdf' ? '📄' : node.tag === 'content' ? '📰' : node.tag === 'tool' ? '🔍' : node.tag === 'program' ? '⚕️' : '📁') : '↳');
  row.appendChild(iconEl);

  // label
  const label = document.createElement('div');
  label.className = `tree-label depth-${Math.min(depth, 2)}`;
  label.textContent = node.label;
  row.appendChild(label);

  // tag chip
  if (node.tag && node.tag !== '') {
    const tag = document.createElement('span');
    tag.className = `tree-tag ${tagInfo.cls}`;
    tag.textContent = node.tag;
    row.appendChild(tag);
  }

  // child count
  if (hasChildren) {
    const cc = document.createElement('span');
    cc.className = 'child-count';
    cc.textContent = `${node.children.length}`;
    row.appendChild(cc);
  }

  el.appendChild(row);

  if (hasChildren) {
    const children = document.createElement('div');
    children.className = 'tree-children';
    node.children.forEach(child => {
      children.appendChild(renderNode(child, depth + 1));
    });
    el.appendChild(children);

    row.onclick = () => {
      const isOpen = children.classList.contains('open');
      children.classList.toggle('open', !isOpen);
      toggle.classList.toggle('open', !isOpen);
    };

    // auto-open depth 0
    if (depth === 0) {
      children.classList.add('open');
      toggle.classList.add('open');
    }
  }

  return el;
}

// ─────────────────────────────────────────────
// SHOW SITE
// ─────────────────────────────────────────────
function showSite(id) {
  const site = SITES.find(s => s.id === id);
  if (!site) return;

  // sidebar active
  document.querySelectorAll('.site-item').forEach(el => el.classList.remove('active'));
  const sideItem = document.querySelector(`.site-item[data-id="${id}"]`);
  if (sideItem) sideItem.classList.add('active');

  // topbar
  const badge = document.getElementById('site-badge');
  badge.className = `cat-${site.cat}`;
  badge.id = 'site-badge';
  badge.textContent = site.abbr;
  badge.style.display = '';

  document.getElementById('site-title').textContent = site.name;
  document.getElementById('site-url').innerHTML = `<a href="https://${site.url}" target="_blank" rel="noopener">${site.url}</a>`;

  const chip = document.getElementById('cat-chip');
  chip.className = `meta-chip cat-${site.cat}`;
  chip.textContent = `${CATS[site.cat].label} · ${fmtPages(site.pages)} pages`;
  chip.style.display = '';

  document.getElementById('expand-all').style.display = '';
  document.getElementById('collapse-all').style.display = '';
  document.getElementById('back-btn').style.display = 'flex';

  // switch views
  document.getElementById('overview-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'none';
  const tv = document.getElementById('tree-view');
  tv.style.display = 'block';
  tv.innerHTML = '';

  // render tree
  const root = document.createElement('div');
  root.className = 'tree-root';

  const header = document.createElement('div');
  header.className = 'tree-root-header';
  header.innerHTML = `
    <span>🌐 <strong>${site.url}</strong></span>
    <span>📄 ${fmtPages(site.pages)} pages in sitemap</span>
    <span>🏷 ${CATS[site.cat].label}</span>
    <span>🔗 Top nav: ${site.topNav.join(' · ')}</span>
  `;
  root.appendChild(header);

  const body = document.createElement('div');
  body.className = 'tree-body';

  site.tree.forEach(node => {
    body.appendChild(renderNode(sortTree(node), 0));
  });

  root.appendChild(body);
  tv.appendChild(root);
}

function showOverview() {
  document.querySelectorAll('.site-item').forEach(el => el.classList.remove('active'));
  document.getElementById('site-badge').textContent = '';
  document.getElementById('site-badge').className = '';
  document.getElementById('site-badge').style.display = 'none';
  document.getElementById('site-title').textContent = 'All Sites';
  document.getElementById('site-url').textContent = 'northwell.edu network';
  document.getElementById('cat-chip').style.display = 'none';
  document.getElementById('expand-all').style.display = 'none';
  document.getElementById('collapse-all').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('overview-view').style.display = '';
  document.getElementById('tree-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'none';
  document.getElementById('search').value = '';
  // reset sidebar filter
  document.querySelectorAll('.site-item').forEach(el => el.style.display = '');
  document.querySelectorAll('.site-group-label, .site-group-sep').forEach(el => el.style.display = '');
}

function expandAll() {
  document.querySelectorAll('.tree-children').forEach(el => el.classList.add('open'));
  document.querySelectorAll('.tree-toggle').forEach(el => { if (!el.classList.contains('leaf')) el.classList.add('open'); });
}

function collapseAll() {
  document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.tree-toggle').forEach(el => el.classList.remove('open'));
}

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// SEARCH INDEX
// ─────────────────────────────────────────────
const SEARCH_INDEX = []; // { site, label, breadcrumb }

function indexNode(node, site, ancestors) {
  SEARCH_INDEX.push({ site, label: node.label, breadcrumb: ancestors.join(' › ') });
  if (node.children && node.children.length) {
    node.children.forEach(child => indexNode(child, site, [...ancestors, node.label]));
  }
}

SITES.forEach(site => {
  if (site.tree && site.tree.length) {
    site.tree.forEach(root => indexNode(root, site, []));
  }
});

function highlight(text, q) {
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx)) + '<mark>' + escHtml(text.slice(idx, idx + q.length)) + '</mark>' + escHtml(text.slice(idx + q.length));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showSearchView(q) {
  const sv = document.getElementById('search-view');
  document.getElementById('overview-view').style.display = 'none';
  document.getElementById('tree-view').style.display = 'none';
  sv.style.display = '';

  const ql = q.toLowerCase();
  const hits = SEARCH_INDEX.filter(e => e.label.toLowerCase().includes(ql));

  if (!hits.length) {
    sv.innerHTML = `<div class="search-no-results">No results for "<strong>${escHtml(q)}</strong>"</div>`;
    return;
  }

  // group by site
  const bySite = {};
  hits.forEach(h => {
    if (!bySite[h.site.id]) bySite[h.site.id] = { site: h.site, hits: [] };
    bySite[h.site.id].hits.push(h);
  });

  const siteCount = Object.keys(bySite).length;
  let html = `<div class="search-summary">${hits.length} result${hits.length !== 1 ? 's' : ''} across ${siteCount} site${siteCount !== 1 ? 's' : ''}</div>`;

  Object.values(bySite).forEach(({ site, hits: siteHits }) => {
    html += `<div class="search-group">
      <div class="search-group-header">
        <span class="search-group-name" onclick="showSite('${site.id}')">${escHtml(site.name)}</span>
        <span class="search-group-url">${escHtml(site.url)}</span>
      </div>`;
    siteHits.slice(0, 12).forEach(h => {
      html += `<div class="search-hit" onclick="showSite('${site.id}')">
        <span>${highlight(h.label, q)}</span>
        ${h.breadcrumb ? `<span class="search-hit-path">${escHtml(h.breadcrumb)}</span>` : ''}
      </div>`;
    });
    if (siteHits.length > 12) {
      html += `<div style="font-size:11px;color:var(--gray-600);padding:4px 10px">+${siteHits.length - 12} more — <span style="cursor:pointer;text-decoration:underline" onclick="showSite('${site.id}')">open site</span></div>`;
    }
    html += `</div>`;
  });

  sv.innerHTML = html;
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim();

  // Always filter sidebar items
  document.querySelectorAll('.site-item').forEach(el => {
    const name = el.querySelector('.site-name').textContent.toLowerCase();
    el.style.display = (!q || name.includes(q.toLowerCase())) ? '' : 'none';
  });
  document.querySelectorAll('.site-group-label, .site-group-sep').forEach(el => {
    const items = [];
    let sib = el.nextElementSibling;
    while (sib && !sib.classList.contains('site-group-label') && !sib.classList.contains('site-group-sep')) {
      if (sib.classList.contains('site-item')) items.push(sib);
      sib = sib.nextElementSibling;
    }
    el.style.display = items.some(i => i.style.display !== 'none') ? '' : 'none';
  });

  if (q.length >= 2) {
    showSearchView(q);
  } else {
    document.getElementById('search-view').style.display = 'none';
    document.getElementById('overview-view').style.display = '';
    document.getElementById('tree-view').style.display = 'none';
  }
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildSidebar();
buildOverview();
showOverview();
</script>
